<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Галерея - Фиджитал Спорт</title>
</head>
<body>
    <header>
        <h1>Фиджитал Спорт</h1>
        <nav>
            <a href="../index.html">Главная</a>
            <a href="#">Галерея</a>
            <a href="../news-page/index.html">Новости</a>
            <a href="../contacts/index.html">Контакты</a>
        </nav>
    </header>

    <main>
        <section class="gallery-section">
            <h2>ГАЛЕРЕЯ</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="../photo/1.png" alt="Фото 1" class="gallery-image" data-index="0">
                </div>
                <div class="gallery-item">
                    <img src="photo/2.jpg" alt="Фото 2" class="gallery-image" data-index="1">
                </div>
                <div class="gallery-item">
                    <img src="photo/3.jpeg" alt="Фото 3" class="gallery-image" data-index="2">
                </div>
                <div class="gallery-item">
                    <img src="photo/4.png" alt="Фото 4" class="gallery-image" data-index="3">
                </div>
                <div class="gallery-item">
                    <img src="photo/5.jpg" alt="Фото 5" class="gallery-image" data-index="4">
                </div>
                <div class="gallery-item">
                    <img src="photo/6.jpeg" alt="Фото 6" class="gallery-image" data-index="5">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Фиджитал Спорт. Все права защищены.</p>
    </footer>

    <!-- Лайтбокс (модальное окно для полноэкранного просмотра) -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script src="js/script.js"></script>
</body>
</html>
