<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY&lang=ru_RU"></script>
    <title>Контакты - Фиджитал Спорт</title>
</head>
<body>
    <header>
        <h1>Фиджитал Спорт</h1>
        <nav>
            <a href="../">Главная</a>
            <a href="../gallery/">Галерея</a>
            <a href="../news-page/">Новости</a>
            <a href="#">Контакты</a>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Контакты</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <h3>Адрес</h3>
                    <p>ул. Спортивная, 123, г. Москва, Россия</p>
                </div>
                <div class="contact-item">
                    <h3>Телефон</h3>
                    <p>+7 (123) 456-78-90</p>
                </div>
                <div class="contact-item">
                    <h3>Email</h3>
                    <p>info@fidgitalsport.ru</p>
                </div>
                <div class="contact-item">
                    <h3>Социальные сети</h3>
                    <div class="social-links">
                        <a href="https://vk.com/fidgitalsport" target="_blank">VK</a>
                        <a href="https://t.me/fidgitalsport" target="_blank">Telegram</a>
                        <a href="https://instagram.com/fidgitalsport" target="_blank">Instagram</a>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <h3>Обратная связь</h3>
                <form action="submit_form.php" method="post">
                    <label for="name">Имя:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Сообщение:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit">Отправить</button>
                </form>
            </div>

            <div class="map">
                <h3>Расположение на карте</h3>
                <div id="yandex-map" style="width: 100%; height: 400px;"></div>
            </div>
        </section>
    </main>

    <footer>
    </footer>
    <script src="js/map.js"></script>
</body>
</html>
